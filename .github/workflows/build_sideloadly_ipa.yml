name: Build unsigned IPA for Sideloadly

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-sideloadly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-unsigned-ipa:
    name: Build clothes.ipa
    runs-on: macos-15
    timeout-minutes: 35
    environment: ios-release
    env:
      IOS_RELEASE_DART_DEFINES_BASE64: ${{ secrets.IOS_RELEASE_DART_DEFINES_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Decode and validate runtime configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$IOS_RELEASE_DART_DEFINES_BASE64" ]]; then
            echo "::error::Missing ios-release environment value: IOS_RELEASE_DART_DEFINES_BASE64"
            exit 1
          fi
          DEFINES_PATH="$RUNNER_TEMP/sideload.dart-defines.json"
          printf '%s' "$IOS_RELEASE_DART_DEFINES_BASE64" | base64 -D > "$DEFINES_PATH"
          echo "IOS_DEFINES_PATH=$DEFINES_PATH" >> "$GITHUB_ENV"
          ruby -rjson -ruri -e '
            data = JSON.parse(File.read(ARGV.fetch(0)))
            required = %w[
              SUPABASE_URL SUPABASE_ANON_KEY APP_URL_SCHEME
              PUBLIC_WEB_BASE_URL PRODUCT_ANALYZER_URL
              ALLOW_UNSAFE_LOCAL_DEMO FIREBASE_PROJECT_ID
              FIREBASE_MESSAGING_SENDER_ID FIREBASE_IOS_API_KEY
              FIREBASE_IOS_APP_ID FIREBASE_IOS_BUNDLE_ID
            ]
            missing = required.select { |key| data[key].to_s.strip.empty? }
            abort "Missing release dart-defines: #{missing.join(", ")}" unless missing.empty?
            placeholders = data.select do |_key, value|
              value.to_s.match?(/YOUR_|your-production-domain|\.example(?:\/|$)/i)
            end.keys
            abort "Placeholder release dart-defines: #{placeholders.join(", ")}" unless placeholders.empty?
            abort "ALLOW_UNSAFE_LOCAL_DEMO must be false in release" unless data["ALLOW_UNSAFE_LOCAL_DEMO"] == false
            %w[SUPABASE_URL PUBLIC_WEB_BASE_URL PRODUCT_ANALYZER_URL].each do |key|
              uri = URI(data.fetch(key)) rescue nil
              abort "#{key} must be a valid HTTPS URL" unless uri&.scheme == "https" && uri.host
            end
          ' "$DEFINES_PATH"

      - name: Build iOS app without code signing
        run: >-
          flutter build ios --release --no-codesign
          --dart-define-from-file="$IOS_DEFINES_PATH"

      - name: Package unsigned IPA for Sideloadly
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/ios/iphoneos/Runner.app"
          IPA_DIR="$GITHUB_WORKSPACE/build/ios/sideloadly"
          PAYLOAD_DIR="$IPA_DIR/Payload"
          IPA_PATH="$IPA_DIR/clothes.ipa"

          [[ -d "$APP_PATH" ]] || {
            echo "::error::Unsigned Runner.app was not produced"
            exit 1
          }

          rm -rf "$IPA_DIR"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/Runner.app"

          cd "$IPA_DIR"
          /usr/bin/zip -qry "$IPA_PATH" Payload
          /usr/bin/unzip -tq "$IPA_PATH"
          shasum -a 256 "$IPA_PATH" > SHA256SUMS.txt
          ls -lh "$IPA_PATH" SHA256SUMS.txt

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: clothes-sideloadly-${{ github.run_number }}
          path: |
            build/ios/sideloadly/clothes.ipa
            build/ios/sideloadly/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Remove temporary runtime configuration
        if: always()
        shell: bash
        run: |
          if [[ -n "${IOS_DEFINES_PATH:-}" ]]; then
            rm -f "$IOS_DEFINES_PATH"
          fi
