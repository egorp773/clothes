name: clothes
description: "Mobile marketplace for clothing and styled outfits"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.8.4
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  image: ^4.8.0
  http: ^1.6.0
  http_parser: ^4.1.2
  url_launcher: ^6.3.2
  camera: ^0.12.0+1
  photo_manager: ^3.10.0
  share_plus: ^10.1.4
  video_player: ^2.10.0
  image_gallery_saver_plus: ^4.0.1
  flutter_web_auth_2: ^5.0.3
  firebase_core: 4.9.0
  firebase_messaging: 16.2.2
  flutter_local_notifications: 21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700

  assets:
    - assets/products/
    - assets/mock/
    - assets/icons/
