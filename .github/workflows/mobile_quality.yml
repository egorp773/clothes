name: Mobile quality gates

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: mobile-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-quality:
    name: Analyze, test, and compile Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Compile Android debug APK
        run: flutter build apk --debug

  ios-compile:
    name: Compile unsigned iOS app
    needs: flutter-quality
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compile iOS without code signing
        run: flutter build ios --release --no-codesign
