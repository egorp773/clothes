services:
  analyzer:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    env_file: ../.env
    environment:
      NUMBA_CACHE_DIR: /tmp/numba
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      REQUIRE_ANALYSIS_AUTH: "true"
      ALLOW_HTTP_REMOTE_IMAGES: "false"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8090/ready || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 180s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - private

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      analyzer:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - private

networks:
  private:

volumes:
  caddy_data:
  caddy_config:
